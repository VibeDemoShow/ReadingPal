name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: Install dependencies
        run: npm ci

      # Build SQLite version (uses AsyncStorage fallback on web)
      # baseUrl is already /ReadingPal in app.json, GitHub Pages serves
      # repo content at /ReadingPal/, so files go to root of combined-dist
      - name: Build SQLite version
        env:
          EXPO_PUBLIC_BACKEND: sqlite
        run: |
          npx expo export -p web
          mkdir -p combined-dist
          cp -r dist/* combined-dist/
          rm -rf dist

      # Build Supabase version at /ReadingPal/cloud
      - name: Build Supabase version
        env:
          EXPO_PUBLIC_BACKEND: supabase
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            config.expo.experiments.baseUrl = '/ReadingPal/cloud';
            fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
          "
          npx expo export -p web
          mkdir -p combined-dist/cloud
          cp -r dist/* combined-dist/cloud/
          rm -rf dist
          # Restore app.json
          git checkout app.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
